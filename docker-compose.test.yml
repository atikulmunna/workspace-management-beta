services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wstest
      POSTGRES_PASSWORD: wstest
      POSTGRES_DB: workspace_service_test
    ports:
      - "5433:5432" # Use 5433 to avoid conflicts with a local Postgres instance
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U wstest" ]
      interval: 5s
      timeout: 5s
      retries: 10
