# Railway deployment is handled automatically via Railway's native GitHub source integration.
# Every push to master triggers a deploy directly in Railway — no CLI, token, or jobs needed.
#
# One-time Railway dashboard setup:
#   Project → Service → Settings → Source → GitHub → Branch: master → Auto Deploy: ON
#
# With that enabled, Railway watches this repo and deploys on every push to master.
# The Dockerfile in the repo root is used for the build automatically.

name: "Railway deploys natively — see comments above"
on: {}   # No triggers — Railway handles deployment directly
jobs: {}
